name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '*.md'
      - '.gitignore'
      - '.github/workflows/build.yml'
      - 'img/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '*.md'
      - '.gitignore'
      - '.github/workflows/build.yml'
      - 'img/**'

# 设置权限
permissions:
  contents: write

jobs:
  # 代码检查和测试
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

  # Windows 构建
  build-windows:
    needs: [lint-and-test]
    runs-on: windows-latest
    if: always() && needs.lint-and-test.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild sharp for Windows
        run: npm rebuild sharp --platform=win32 --arch=x64
      - name: Build application
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallhaven-windows
          path: dist/*.exe
          if-no-files-found: error

  # macOS ARM64 (Apple Silicon) 构建
  build-macos-arm64:
    needs: [lint-and-test]
    runs-on: macos-latest
    if: always() && needs.lint-and-test.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild sharp for macOS ARM64
        run: npm rebuild sharp --platform=darwin --arch=arm64

      - name: Build application
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: get version
        id: get_tag
        run: |
          TAG_NAME=$(node -p "require('./package.json').version")
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"
      - name: Rename artifact
        run: mv dist/wallhaven-${{steps.get_tag.outputs.tag_name}}.dmg dist/wallhaven-${{ steps.get_tag.outputs.tag_name }}-arm64.dmg

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallhaven-macos-arm64
          path: dist/*.dmg
          if-no-files-found: error

  # macOS x64 (Intel) 构建
  build-macos-x64:
    needs: [lint-and-test]
    runs-on: macos-26-intel
    if: always() && needs.lint-and-test.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild sharp for macOS x64
        run: npm rebuild sharp --platform=darwin --arch=x64

      - name: Build application
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: get version
        id: get_tag
        run: |
          TAG_NAME=$(node -p "require('./package.json').version")
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"
      - name: Rename artifact
        run: mv dist/wallhaven-${{steps.get_tag.outputs.tag_name}}.dmg dist/wallhaven-${{ steps.get_tag.outputs.tag_name }}-amd64.dmg
      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallhaven-macos-x64
          path: dist/*.dmg
          if-no-files-found: error

  # Linux 构建
  build-linux:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: always() && needs.lint-and-test.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild sharp for Linux x64
        run: npm rebuild sharp --platform=linux --arch=x64

      - name: Build application
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallhaven-linux
          path: |
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
          if-no-files-found: error

  # 发布到 GitHub Releases
  release:
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux]
    runs-on: ubuntu-latest
    if: always() && needs.build-windows.result == 'success' && needs.build-macos-arm64.result == 'success' && needs.build-macos-x64.result == 'success' && needs.build-linux.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag name
        id: get_tag
        run: |
          TAG_NAME=$(node -p "require('./package.json').version")
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Wallhaven Electron App ${{ steps.get_tag.outputs.tag_name }}
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          files: |
            artifacts/wallhaven-windows/*
            artifacts/wallhaven-macos-arm64/*
            artifacts/wallhaven-macos-x64/*
            artifacts/wallhaven-linux/*
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            This release contains the following artifacts:
            - Windows: wallhaven-${{ steps.get_tag.outputs.tag_name }}.exe
            - macOS (Apple Silicon): wallhaven-${{ steps.get_tag.outputs.tag_name }}.dmg
            - macOS (Intel): wallhaven-${{ steps.get_tag.outputs.tag_name }}.dmg
            - Linux: wallhaven-${{ steps.get_tag.outputs.tag_name }}.AppImage
