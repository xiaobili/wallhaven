<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallhaven</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a1a;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease-out;
    }

    .logo {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 700;
      font-size: 42px;
      color: #fff;
      opacity: 0;
      animation:
        focus-in-expand 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards,
        jello-horizontal 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.8s forwards,
        blur-out-expand 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 2s forwards;
      will-change: transform, opacity, filter;
      contain: layout paint;
    }

    /* ----------------------------------------------
 * Generated by Animista on 2026-4-30 16:44:44
 * Licensed under FreeBSD License.
 * See http://animista.net/license for more info. 
 * w: http://animista.net, t: @cssanimista
 * ---------------------------------------------- */

    @keyframes focus-in-expand {
      0% {
        letter-spacing: -0.5em;
        -webkit-filter: blur(12px);
        filter: blur(12px);
        opacity: 0;
      }

      100% {
        -webkit-filter: blur(0px);
        filter: blur(0px);
        opacity: 1;
      }
    }

    @keyframes blur-out-expand {
      0% {
        -webkit-filter: blur(0.01);
        filter: blur(0.01);
      }

      100% {
        letter-spacing: 1em;
        -webkit-filter: blur(12px) opacity(0%);
        filter: blur(12px) opacity(0%);
      }
    }


    @keyframes jello-horizontal {
      0% {
        -webkit-transform: scale3d(1, 1, 1);
        transform: scale3d(1, 1, 1);
      }

      30% {
        -webkit-transform: scale3d(1.25, 0.75, 1);
        transform: scale3d(1.25, 0.75, 1);
      }

      40% {
        -webkit-transform: scale3d(0.75, 1.25, 1);
        transform: scale3d(0.75, 1.25, 1);
      }

      50% {
        -webkit-transform: scale3d(1.15, 0.85, 1);
        transform: scale3d(1.15, 0.85, 1);
      }

      65% {
        -webkit-transform: scale3d(0.95, 1.05, 1);
        transform: scale3d(0.95, 1.05, 1);
      }

      75% {
        -webkit-transform: scale3d(1.05, 0.95, 1);
        transform: scale3d(1.05, 0.95, 1);
      }

      100% {
        -webkit-transform: scale3d(1, 1, 1);
        transform: scale3d(1, 1, 1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo {
        animation-name: fadeIn;
        animation-duration: 0.15s;
        animation-timing-function: ease-out;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }

        100% {
          opacity: 1;
        }
      }
    }
  </style>
</head>

<body>
  <div class="logo">Wallhaven</div>
</body>

</html>
